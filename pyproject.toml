[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
# -p no:dash: the system dash package registers a broken pytest11 plugin that
# crashes pytest startup with ModuleNotFoundError: No module named 'pkg_resources'.
# Disabling it here makes pytest portable across this machine's miniconda env.
addopts = "-v --tb=short -p no:dash"
markers = [
    "smoke: requires Docker (deselect with -m 'not smoke')",
    "unit: pure in-process unit tests",
]
